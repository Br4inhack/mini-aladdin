<!-- components/panels/tables_row.html -->
<div class="css-grid grid-cols-2">
  
  <!-- Holdings Table -->
  <div class="card">
    <div class="section-title">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
      Current Holdings
    </div>
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Asset</th>
            <th class="r">Value</th>
            <th class="r">PnL</th>
            <th class="c">AI Risk</th>
          </tr>
        </thead>
        <tbody>
          <tr x-show="loading"><td colspan="4"><div class="skeleton" style="height:32px; width:100%;"></div><div class="skeleton" style="height:32px; width:100%; margin-top:8px;"></div></td></tr>
          <tr x-show="!loading && !positions.length">
            <td colspan="4" style="padding:24px 0;">
              <div class="crpms-empty" style="border:none;">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
                <div class="title">No Active Positions</div>
                <p>This portfolio currently has no open holdings.</p>
              </div>
            </td>
          </tr>
          <template x-for="p in positions" :key="p.ticker">
            <tr
              class="clickable"
              :style="selectedNewsTicker === p.ticker.ticker ? 'border-left:3px solid var(--accent-blue); background:rgba(59,130,246,0.05);' : 'border-left:3px solid transparent;'"
              @click="loadNewsForTicker(p.ticker.ticker)"
              @click.ctrl.prevent="window.open('/dashboard/asset/'+p.ticker.ticker+'/', '_blank')"
              style="cursor:pointer; transition:background 0.2s;"
              :title="'Click for news · Ctrl+Click for tear sheet: ' + p.ticker.ticker">
              <td>
                <div style="font-weight:600; color:var(--text-main);" x-text="p.ticker.ticker"></div>
                <div class="text-sm text-muted" x-text="p.ticker.company_name"></div>
              </td>
              <td class="r mono" x-text="window.CRPMS.inr((p.current_price || 0) * (p.quantity || 0))"></td>
              <td class="r mono" :class="(p.unrealised_pnl || 0) >= 0 ? 'text-green' : 'text-red'" x-text="window.CRPMS.inr(p.unrealised_pnl || 0)"></td>
              <td class="c">
                 <div class="badge" :style="`border: 1px solid ${window.CRPMS.riskConfig[p.risk_band]?.border || window.CRPMS.riskConfig.UNKNOWN.border}; color: ${window.CRPMS.riskConfig[p.risk_band]?.text}`" x-text="p.risk_band"></div>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Opportunity Scanner -->
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <div class="section-title" style="margin:0;">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
        Master Scanner Opportunities
      </div>
      <a href="/dashboard/watchlist/" class="text-blue text-sm" style="font-weight:600;">View All &rarr;</a>
    </div>
    
    <div style="display:flex; flex-direction:column; gap:16px;">
      <div x-show="loading" class="skeleton" style="height:60px;width:100%;"></div>
      <div x-show="loading" class="skeleton" style="height:60px;width:100%;"></div>
      <div x-show="!loading && !opportunities.length" class="crpms-empty">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <div class="title">No Opportunities Found</div>
        <p>The Master Scanner algorithm did not flag any assets.</p>
      </div>
      <template x-for="opp in opportunities.slice(0, 4)" :key="opp.ticker">
        <div class="interactive" style="display:flex; align-items:center; justify-content:space-between; padding:16px; background:var(--bg-body); border-radius:12px; border:1px solid var(--border-light); transition:transform 0.2s;">
          <div>
            <strong style="color:var(--text-main); font-size:15px;" x-text="opp.ticker"></strong>
            <div class="text-muted text-sm" x-text="opp.company_name"></div>
          </div>
          <div style="display:flex; align-items:center; gap:16px;">
             <div class="badge" :style="`border: 1px solid ${window.CRPMS.riskConfig[opp.risk_band]?.border || window.CRPMS.riskConfig.UNKNOWN.border}; color: ${window.CRPMS.riskConfig[opp.risk_band]?.text}`" x-text="opp.risk_band"></div>
             <button class="btn-action text-blue bg-blue-sm" style="border-color:var(--accent-blue); padding:6px 12px; font-size:12px;" onclick="alert('Re-allocating capital...')">Reallocate</button>
          </div>
        </div>
      </template>
    </div>

  </div>

</div>
