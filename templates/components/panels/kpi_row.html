<!-- components/panels/kpi_row.html -->
<div class="css-grid grid-cols-4" style="margin-bottom: 32px;">
  <!-- Capital -->
  <div class="card interactive">
    <div class="section-title text-muted text-sm" style="margin-bottom:8px;">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
      Invested Capital
    </div>
    <div class="card-value mono" style="font-size:26px; font-weight:700; color:#fff;" x-text="loading ? '₹...' : window.CRPMS.inr(summary.total_capital)"></div>
    <div class="text-sm text-muted" style="margin-top:6px;">Deployable: <span x-text="loading ? '...' : window.CRPMS.inr(summary.available_capital)"></span></div>
  </div>

  <!-- Current Value -->
  <div class="card interactive">
    <div class="section-title text-muted text-sm" style="margin-bottom:8px;">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>
      Current Value
    </div>
    <div class="card-value mono" style="font-size:26px; font-weight:700; color:#fff;" x-text="loading ? '₹...' : window.CRPMS.inr(currentValue)"></div>
    <div class="text-sm text-muted" style="margin-top:6px;">Real-time market valuation</div>
  </div>

  <!-- PnL -->
  <div id="ws-pnl-card" class="card interactive" :style="!loading && summary.total_pnl_pct >= 0 ? 'box-shadow: 0 4px 20px rgba(16,185,129,0.1)' : 'box-shadow: 0 4px 20px rgba(239,68,68,0.1)'">
    <div class="section-title text-muted text-sm" style="margin-bottom:8px;">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
      Total PnL
    </div>
    <div class="card-value mono live-value" style="font-size:26px; font-weight:700;" :class="!loading && summary.total_pnl_pct >= 0 ? 'text-green' : 'text-red'" x-text="loading ? '...' : window.CRPMS.pct(summary.total_pnl_pct)"></div>
    <div class="text-sm" :class="!loading && summary.total_pnl_pct >= 0 ? 'text-green' : 'text-red'" style="margin-top:6px; font-weight:500;">
      <span x-text="!loading && summary.total_pnl_pct >= 0 ? '↑' : '↓'"></span>
      <span class="mono" x-text="loading ? '...' : window.CRPMS.inr(currentValue - summary.total_capital)"></span>
    </div>
  </div>

  <!-- AI Risk Level — includes drawdown guard badge -->
  <div class="card interactive">
    <div class="section-title text-muted text-sm" style="margin-bottom:8px;">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
      Portfolio Risk
    </div>
    <div class="card-value mono" style="font-size:26px; font-weight:700;" 
         :style="!loading ? `color: ${window.CRPMS.riskConfig[portfolioRisk].text}` : ''"
         x-text="loading ? '...' : portfolioRisk"></div>
    <div style="margin-top:8px;">
      <span id="ws-drawdown-badge" class="badge"
            :style="!loading && summary.drawdown_guard_active ? 'border:1px solid rgba(239,68,68,0.4); color:var(--accent-red);' : 'border:1px solid rgba(16,185,129,0.4); color:var(--accent-green);'"
            x-text="!loading && summary.drawdown_guard_active ? 'ACTIVE' : 'INACTIVE'"></span>
      <span class="text-muted text-sm" style="margin-left:6px;">Guard</span>
    </div>
  </div>
</div>
