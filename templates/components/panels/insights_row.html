<!-- components/panels/insights_row.html -->
<div class="css-grid grid-cols-3">
  
  <!-- 1. Risk Analysis -->
  <div class="card interactive">
    <div class="section-title">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
      Risk Diagnostics
    </div>
    <div style="margin-top:24px;">
      <div style="margin-bottom:20px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
          <span class="text-sm">Value At Risk (VaR)</span>
          <span class="text-sm mono text-red" x-text="loading ? '-' : '4.2%'"></span>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width:80%; background:var(--accent-red);"></div></div>
      </div>
      <div style="margin-bottom:20px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
          <span class="text-sm">Max Drawdown</span>
          <span class="text-sm mono text-yellow" x-text="loading ? '-' : '11.5%'"></span>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width:45%; background:var(--accent-yellow);"></div></div>
      </div>
      <div>
        <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
          <span class="text-sm">Asset Correlation</span>
          <span class="text-sm mono text-green" x-text="loading ? '-' : '0.34'"></span>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width:34%; background:var(--accent-green);"></div></div>
      </div>
    </div>
  </div>

  <!-- 2. Sentiment Heat -->
  <div class="card interactive" style="overflow-y:auto; max-height:400px;">
    <div class="section-title">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
      Live Sentiment Stream
    </div>
    <div x-show="loading" class="skeleton" style="height:150px;width:100%;"></div>
    <div x-show="!loading" style="display:flex; flex-direction:column; gap:12px; margin-top:16px;">
      <template x-for="p in positions" :key="p.ticker">
         <div style="padding:12px; border-radius:10px; background:var(--bg-body); border:1px solid var(--border-light); display:flex; justify-content:space-between; align-items:center;">
           <strong x-text="p.ticker"></strong>
           <div class="badge" 
                :style="`border: 1px solid ${window.CRPMS.riskConfig[p.risk_band]?.border || window.CRPMS.riskConfig.UNKNOWN.border}; color: ${window.CRPMS.riskConfig[p.risk_band]?.text}`">
             <div class="badge-dot" :style="`background: ${window.CRPMS.riskConfig[p.risk_band]?.pulse}`"></div>
             <span x-text="p.risk_band"></span>
           </div>
         </div>
      </template>
    </div>
  </div>

  <!-- 3. AI Directives -->
  <div class="card interactive" style="overflow-y:auto; max-height:400px;">
    <div class="section-title">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      Action Directives
    </div>
    <div x-show="loading" class="skeleton" style="height:150px;width:100%;"></div>
    <template x-for="log in tradeLogs.slice(0,3)" :key="log.id">
      <div style="padding:16px; border-radius:12px; background:rgba(255,255,255,0.02); border:1px solid var(--border-light); margin-top:16px;">
         <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
           <strong x-text="log.ticker.ticker" style="font-size:15px;"></strong>
           <span class="badge" :style="`border: 1px solid ${window.CRPMS.actionConfig[log.action]?.border || window.CRPMS.actionConfig.HOLD.border}; color: ${window.CRPMS.actionConfig[log.action]?.text}`" x-text="log.action"></span>
         </div>
         <p class="text-muted text-sm" style="line-height:1.5; margin-bottom:12px;" x-text="log.reasoning_text || 'AI rule triggered.'"></p>
         <div style="display:flex; justify-content:flex-end; gap:8px;">
           <button class="btn-action" style="padding: 4px 12px; font-size:11px;" onclick="alert('Ignored')">Ignore</button>
           <button class="btn-action text-blue bg-blue-sm" style="padding: 4px 12px; font-size:11px; border-color:var(--accent-blue);" onclick="alert('Executing Trade...')">Approve</button>
         </div>
      </div>
    </template>
  </div>

</div>
