<!-- components/panels/macro_panel.html -->
<div class="card" x-data="{ expanded: false, loaded: false, indicators: [], async loadMacro() { if(this.loaded) return; this.loaded = true; try { const res = await fetch(`/api/portfolio/`+this.portfolioId+`/macro-indicators/`).then(r=>r.json()); this.indicators = Array.isArray(res)? res : []; } catch(e){ console.error(e); } } }" style="margin-bottom: 24px;">
  
  <!-- Header -->
  <div class="section-title" @click="expanded = !expanded; if(expanded) loadMacro();" style="display: flex; justify-content: space-between; cursor: pointer; margin-bottom: 0;">
    <div style="display: flex; align-items: center; gap: 8px;">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      Macro Indicators
    </div>
    <!-- Chevron -->
    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="transition: transform 0.3s;" :style="expanded ? 'transform: rotate(180deg);' : ''">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
    </svg>
  </div>

  <!-- Body -->
  <div x-show="expanded" x-collapse style="padding-top: 20px; border-top: 1px solid var(--border-light); margin-top: 16px;">
    
    <div x-show="indicators.length === 0 && loaded" class="text-muted text-sm c" style="padding: 16px 0;">
      No macroeconomic data available.
    </div>

    <!-- Grid of Indicator Cards -->
    <div class="css-grid" style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px;">
      <template x-for="item in indicators" :key="item.indicator_name">
        <div style="background: var(--bg-surface); border: 1px solid var(--border-light); border-radius: 8px; padding: 16px;">
          <div style="display: flex; justify-content: space-between; align-items: flex-start;">
            
            <div style="flex: 1;">
              <div class="text-sm font-bold text-main" x-text="item.indicator_name" style="margin-bottom: 8px;"></div>
              
              <div style="display: flex; align-items: baseline; gap: 10px;">
                <span class="mono" style="font-size: 24px; font-weight: 700; color: var(--text-main);" x-text="item.formatted_value"></span>
                
                <!-- Trend Arrow -->
                <template x-if="item.trend === 'UP'">
                   <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="var(--accent-green)"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 10l7-7m0 0l7 7m-7-7v18"/></svg>
                </template>
                <template x-if="item.trend === 'DOWN'">
                   <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="var(--accent-red)"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 14l-7 7m0 0l-7-7m7 7V3"/></svg>
                </template>
                <template x-if="item.trend === 'FLAT'">
                   <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="var(--text-muted)"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 12h14"/></svg>
                </template>
              </div>
            </div>

            <!-- Source Badge -->
            <div x-show="item.source" style="padding: 2px 6px; border-radius: 4px; background: rgba(107,114,128,0.1); border: 1px solid var(--border-light); font-size: 9px; color: var(--text-muted); text-transform: uppercase;">
              <span x-text="item.source"></span>
            </div>
            
          </div>
          
          <div class="text-muted" style="font-size: 11px; margin-top: 12px; display: flex; align-items: center; gap: 4px;">
            <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            <span x-text="item.date"></span>
          </div>
        </div>
      </template>
    </div>

  </div>
</div>
