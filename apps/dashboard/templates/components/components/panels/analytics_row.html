<!-- components/panels/analytics_row.html
     Sector Exposure doughnut + PnL Trend line — loaded via initAnalyticsCharts()
     called from index.html initCharts() after the main Promise.all completes.
-->
<div class="css-grid grid-cols-2" style="margin-top:0;" id="analytics-row">

  <!-- Chart A: Capital by Sector -->
  <div class="card">
    <div class="section-title">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"/>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"/>
      </svg>
      Capital by Sector
    </div>
    <div style="height:250px; position:relative;">
      <div id="sector-skeleton" class="skeleton" style="height:100%; border-radius:8px;"></div>
      <canvas id="sectorChart" style="display:none;"></canvas>
      <div id="sector-empty" style="display:none; height:100%; align-items:center; justify-content:center;
                                     color:var(--text-muted); font-size:13px; flex-direction:column; gap:8px;">
        <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="opacity:0.3;">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        No position data
      </div>
    </div>
  </div>

  <!-- Chart B: Portfolio PnL % Trend -->
  <div class="card">
    <div class="section-title">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
      </svg>
      Portfolio PnL %
    </div>
    <div style="height:250px; position:relative;">
      <div id="pnl-skeleton" class="skeleton" style="height:100%; border-radius:8px;"></div>
      <canvas id="pnlChart" style="display:none;"></canvas>
      <div id="pnl-empty" style="display:none; height:100%; align-items:center; justify-content:center;
                                   color:var(--text-muted); font-size:13px; text-align:center;
                                   flex-direction:column; gap:8px; padding:0 24px;">
        <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="opacity:0.3;">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        Insufficient data — check Celery is running
      </div>
    </div>
  </div>

</div>
