<div class="css-grid grid-cols-layout">

  <div class="card">
    <div class="section-title">
       <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"/></svg>

      <div x-show="loading" class="skeleton" style="width:100%; height:100%; border-radius:50%;"></div>
      <canvas id="donutChart" style="opacity: 0; transition: opacity 0.5s ease;"></canvas>
